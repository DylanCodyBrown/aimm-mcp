name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: latest

      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Smoke-test MCP handshake
        # Boot the server, send initialize + tools/list, confirm we
        # get a response with the expected tool count.
        shell: bash
        run: |
          OUT=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | timeout 10 uv run python -m aimm_mcp 2>/dev/null || true)
          echo "$OUT" | grep -q '"aimm_init_project"' || { echo "missing aimm_init_project"; exit 1; }
          echo "$OUT" | grep -q '"aimm_read_project_context"' || { echo "missing aimm_read_project_context"; exit 1; }
          echo "MCP handshake OK"
